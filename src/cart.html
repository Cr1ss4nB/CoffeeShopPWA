<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/cart.css">
    <meta name="theme-color" content="#db4938">
    <title>Mis Órdenes - Cafeteria PWA</title>
</head>

<body>
    <main>
        <nav>
            <h1>Cafeteria PWA</h1>
        </nav>

        <div class="orders-container">
            <a href="index.html" class="back-link">← Volver al menú</a>

            <h2>Mis Órdenes</h2>
            <p class="orders-subtitle">Lista completa de tus pedidos</p>

            <!-- Contenedor donde se mostrarán las órdenes -->
            <div id="orders-list" class="orders-list">
                <p class="loading-message">Cargando órdenes...</p>
            </div>

            <!-- Contenedor para mensajes vacíos o errores -->
            <div id="empty-message" class="empty-message" style="display: none;">
                <p>No tienes órdenes aún...</p>
                <p class="empty-subtitle">Pide algo y ajá</p>
                <a href="index.html" class="btn-primary">Ver Menú</a>
            </div>

            <!-- Botones de acción -->
            <div id="action-buttons" class="action-buttons" style="display: none;">
                <button type="button" class="btn-confirm" id="btn-confirm">Confirmar Todas</button>
                <button type="button" class="btn-reject" id="btn-reject">Rechazar Todas</button>
            </div>
        </div>
    </main>

    <script src="js/ordersCart.js"></script>
</body>

</html>
